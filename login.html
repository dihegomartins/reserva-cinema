<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - CineMestre</title>
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        /* Estilos específicos para a tela de login */
        .login-container {
            background-color: #333;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            margin-top: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-container input {
            padding: 10px;
            margin: 10px 0;
            width: 80%;
            border-radius: 5px;
            border: none;
        }
        .login-container button {
            padding: 10px 20px;
            background-color: #6feaf6;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 85%;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>🎬 CineMestre Login</h2>
        <p>Identifique-se para reservar assentos</p>
        
        <input type="text" id="input-nome" placeholder="Digite seu nome">
        <br>
        <button id="btn-entrar">Entrar no Cinema</button>
    </div>

    <script src="js/login.js"></script> </body>
</html>
