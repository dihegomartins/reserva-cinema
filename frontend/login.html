<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - CineMestre</title>
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        /* Fundo da página inteira */
        body {
            /* Imagem de cinema em alta resolução */
            background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh; /* Ocupa 100% da altura da tela */
            margin: 0;
            display: flex;
            justify-content: center; /* Centraliza a caixa na horizontal */
            align-items: center;     /* Centraliza a caixa na vertical */
            font-family: Arial, sans-serif;
            color: white;
        }

        /* O Efeito Glassmorphism (Vidro Fosco) */
        .login-container {
            background: rgba(255, 255, 255, 0.1); /* Fundo branco quase 100% transparente */
            backdrop-filter: blur(12px); /* A mágica do desfoque no fundo */
            -webkit-backdrop-filter: blur(12px); /* Suporte para navegadores da Apple */
            padding: 40px;
            border-radius: 15px; /* Bordas mais redondinhas */
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); /* Sombra escura para destacar o vidro */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Borda clarinha para simular o reflexo da luz no vidro */
            width: 320px;
        }

        /* Dando um sombreado nos textos para eles não sumirem no fundo */
        .login-container h2 {
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .login-container p {
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }

        /* Melhorando o visual do Input e do Botão */
        .login-container input {
            padding: 12px;
            margin-bottom: 20px;
            width: 100%;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box; /* Garante que o input não vaze da caixa */
            outline: none;
            font-size: 16px;
        }

        .login-container input:focus {
            box-shadow: 0 0 10px #6feaf6; /* Brilha em azul quando clica para digitar */
        }

        .login-container button {
            padding: 12px 20px;
            background-color: #6feaf6;
            color: #111;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease; /* Deixa as animações suaves */
        }

        .login-container button:hover {
            background-color: #4ecadc;
            transform: scale(1.05); /* Dá uma leve crescidinha ao passar o mouse */
        }
        /* --- ESTILOS DE ERRO E ANIMAÇÃO --- */
        
        /* Como o texto de erro se parece (vermelho, pequeno e escondido no início) */
        #msg-erro {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: -15px;
            margin-bottom: 15px;
            text-shadow: none;
            display: none; /* A mágica: começa invisível */
            text-align: left;
            padding-left: 5px;
        }

        /* Classe que o JavaScript vai injetar no input quando der erro */
        .input-erro {
            border: 2px solid #ff6b6b !important;
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.6) !important;
        }

        /* A Animação de tremer a caixa (Keyframes) */
        @keyframes tremer {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
            100% { transform: translateX(0); }
        }

        /* A classe que aciona a animação de tremer e dura 0.3 segundos */
        .tremer {
            animation: tremer 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>🎬 CineMestre Login</h2>
        <p>Identifique-se para reservar assentos</p>
        
        <input type="text" id="input-nome" placeholder="Digite seu nome"><br>

        <p id="msg-erro">Por favor, digite o seu nome para entrar!</p>

        <button id="btn-entrar">Entrar no Cinema</button>
    </div>

    <script src="js/login.js"></script> </body>
</html>
